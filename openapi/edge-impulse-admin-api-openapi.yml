          description: Number of grid columns in detailed view on data acquisition
        showExactSampleLength:
          type: boolean
          description: If enabled, does not round sample length to hours/minutes/seconds, but always displays sample length in milliseconds. E.g. instead of 1m 32s, this'll say 92,142ms.
        inlineEditBoundingBoxes:
          type: boolean
          description: If enabled, allows editing bounding box labels directly from the acquisition UI.
        defaultProfilingVariant:
          $ref: '#/components/schemas/KerasModelVariantEnum'
          description: Last shown variant on the model testing and live classification pages. Used to keep the same view after refreshing.
        enabledModelProfilingVariants:
          type: array
          description: Set of model variants enabled by default on the model testing and live classification pages.
          items:
            $ref: '#/components/schemas/KerasModelVariantEnum'
        impulseListCoreMetricsHiddenColumns:
          type: array
          description: Which core metrics should be hidden in the impulse list. See 'GetAllDetailedImpulsesResponse' for a list of all metrics.
          items:
            type: string
        impulseListAdditionalMetricsShownColumns:
          type: array
          description: Which additional metrics should be shown in the impulse list. See 'GetAllDetailedImpulsesResponse' for a list of all metrics.
          items:
            type: string
        impulseListExtraColumns:
          type: array
          description: Which extra columns should be shown in the impulse list.
          items:
            type: string
        aiActionsGridColumnCount:
          type: integer
          description: Number of grid columns in AI Actions
    AdminListProjectsResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - $ref: '#/components/schemas/AdminListProjects'
    UserOrganization:
      type: object
      required:
      - id
      - name
      - isDeveloperProfile
      - whitelabelId
      - isAdmin
      - created
      - trialId
      - trialExpiredDate
      - trialUpgradedDate
      - entitlementLimits
      - userCount
      - adminCount
      - privateProjectCount
      properties:
        id:
          type: integer
        name:
          type: string
        logo:
          type: string
        isDeveloperProfile:
          type: boolean
        whitelabelId:
          type: integer
          nullable: true
          description: Unique identifier of the white label this project belongs to, if any.
        isAdmin:
          type: boolean
          description: Whether the user is admin of this organization or not.
        created:
          type: string
          format: date-time
          description: When the organization was created.
          example: '2019-08-31T17:32:28Z'
        trialId:
          type: number
          nullable: true
          description: Unique identifier of the trial this organization belongs to, if any.
          example: 1
        trialExpiredDate:
          type: string
          format: date-time
          nullable: true
          description: Date when the trial expired, if any. A expired trial has a grace period of 30 days before it's associated organization is deleted.
          example: '2019-08-31T17:32:28Z'
        trialUpgradedDate:
          type: string
          format: date-time
          nullable: true
          description: Date when the trial was upgraded to a full enterprise account, if any.
          example: '2019-08-31T17:32:28Z'
        entitlementLimits:
          $ref: '#/components/schemas/EntitlementLimits'
        userCount:
          type: integer
          description: The total number of users that are a member of this organization.
        adminCount:
          type: integer
          description: The number of admin users for this organization.
        privateProjectCount:
          type: integer
          description: The number of private projects for this organization.
        lastAccessed:
          type: string
          format: date-time
          description: Last time this user accessed this organization.
    AdminGetMetricsResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - metrics
        properties:
          metrics:
            type: object
    AdminListProjects:
      type: object
      required:
      - projects
      - total
      properties:
        total:
          type: integer
        projects:
          type: array
          description: Array with projects
          items:
            $ref: '#/components/schemas/AdminApiProject'
    AdminAddDisallowedEmailDomainRequest:
      type: object
      required:
      - domain
      properties:
        domain:
          type: string
          example:
          - domain.org
    AdminStartEnterpriseTrialRequest:
      allOf:
      - $ref: '#/components/schemas/StartEnterpriseTrialRequest'
      - type: object
        required:
        - userId
        properties:
          userId:
            type: integer
            description: ID of the user requesting the trial.
    AdminUpdateUserPermissionsRequest:
      type: object
      required:
      - permissions
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    TargetMemory:
      type: object
      description: RAM and ROM specifications of target
      properties:
        ram:
          $ref: '#/components/schemas/MemorySpec'
        rom:
          $ref: '#/components/schemas/MemorySpec'
    AdminGetDataMigrationsResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - migrations
        properties:
          migrations:
            type: array
            items:
              $ref: '#/components/schemas/Migration'
  parameters:
    LogsLimitParameter:
      name: limit
      in: query
      required: true
      description: Maximum number of logs
      schema:
        type: integer
    SearchQueryParameter:
      name: search
      in: query
      required: false
      description: Search query
      schema:
        example: <id> <name>
        type: string
    LimitResultsParameter:
      name: limit
      in: query
      required: false
      description: Maximum number of results
      schema:
        type: integer
    EmailParameter:
      name: email
      in: path
      required: true
      description: Email address
      schema:
        type: string
    MigrationIdParameter:
      name: migrationId
      in: path
      required: true
      description: Data migration ID
      schema:
        type: string
    ProjectIdParameter:
      name: projectId
      in: path
      required: true
      description: Project ID
      schema:
        type: integer
    RequiredStartDateParameter:
      name: startDate
      in: query
      required: true
      description: Start date
      schema:
        type: string
        format: date-time
    JobIdParameter:
      name: jobId
      in: path
      required: true
      description: Job ID
      schema:
        type: integer
    ParentTypeParameter:
      name: parentType
      in: query
      required: true
      description: Job parent type (project, organization, or standalone)
      schema:
        $ref: '#/components/schemas/JobParentTypeEnum'
    ReportIdParameter:
      name: reportId
      in: path
      required: true
      description: Report ID
      schema:
        type: integer
    FiltersActiveParameter:
      name: active
      in: query
      required: false
      description: Whether to search for entities (users, orgs) active in the last X days
      schema:
        type: integer
    FiltersIncludeDeletedParameter:
      name: includeDeleted
      in: query
      required: false
      description: Whether to include deleted entities (users, projects, orgs)
      schema:
        type: boolean
    FullDeleteEntityParameter:
      name: fullDeletion
      in: query
      required: false
      description: Set to true for full deletion
      schema:
        type: boolean
    FindUserQueryParameter:
      name: query
      in: query
      required: true
      description: Part of e-mail address or username
      schema:
        type: string
    OrganizationIdParameter:
      name: organizationId
      in: path
      required: true
      description: Organization ID
      schema:
        type: integer
    RequiredEndDateParameter:
      name: endDate
      in: query
      required: true
      description: End date
      schema:
        type: string
        format: date-time
    OffsetResultsParameter:
      name: offset
      in: query
      required: false
      description: Offset in results, can be used in conjunction with LimitResultsParameter to implement paging.
      schema:
        type: integer
    FiltersTierParameter:
      name: tier
      in: query
      required: false
      description: Whether to search for free, community plus, professional, or enterprise entities (users, projects)
      schema:
        $ref: '#/components/schemas/UserTierEnum'
    LogsOffsetParameter:
      name: offset
      in: query
      required: true
      description: Start fetching logs from this offset
      schema:
        type: integer
    FiltersQueryParameter:
      name: filters
      in: query
      required: false
      schema:
        type: string
        description: 'Comma separated list of filters to apply to the query.

          Filters should be in the format ''field:value''.

          '
        example: billable:true
    ConfigKeyParameter:
      name: configKey
      in: path
      required: true
      description: Config Key
      schema:
        type: string
    FeatureIdParameter:
      name: featureId
      in: path
      required: true
      description: Feature ID.
      schema:
        $ref: '#/components/schemas/Feature'
    EnterpriseTrialIdParameter:
      name: enterpriseTrialId
      in: path
      required: true
      description: Enterprise trial ID
      schema:
        type: integer
    FieldsParameter:
      name: fields
      in: query
      required: false
      description: Comma separated list of fields to fetch in a query
      schema:
        type: string
        example: id,name
    IncludeChildrenJobsParameter:
      name: includeChildrenJobs
      in: query
      required: false
      description: Include the details of each of the children jobs (recursively)
      schema:
        type: boolean
    DomainNameParameter:
      name: domainName
      in: path
      required: true
      description: Email domain name
      schema:
        type: string
    ExportIdParameter:
      name: exportId
      in: path
      required: true
      description: Export ID
      schema:
        type: integer
    UserIdParameter:
      name: userId
      in: path
      required: true
      description: User ID
      schema:
        type: integer
    SortQueryParameter:
      name: sort
      in: query
      required: false
      description: Fields and order to sort query by
      schema:
        type: string
        description: Comma separated list of fields to sort query by. Prefix with a minus (-) sign to indicate descending order. Default order is ascending
        example: id,-name
