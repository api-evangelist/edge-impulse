    StartEnterpriseTrialRequest:
      type: object
      properties:
        email:
          type: string
          description: Email of the user requesting the trial. If this email is different to the one stored for the user requesting the trial, it will be used to replace the existing one.
          example: fred@flintstones.org
        organizationName:
          type: string
          description: Name of the trial organization. All enterprise features are tied to an organization. This organization will be deleted after the trial ends. If no organization name is provided, the user's name will be used.
          example: My Company
        expirationDate:
          $ref: '#/components/schemas/TrialExpirationDate'
        notes:
          $ref: '#/components/schemas/TrialNotes'
        useCase:
          type: string
          description: Use case of the trial.
          example: Industrial
        userHasMLModelsInProduction:
          type: string
          enum:
          - 'yes'
          - 'no'
          - no, but we will soon
          description: Whether the user has ML models in production.
          example: 'no'
        companyName:
          type: string
          description: Name of the company requesting the trial.
          example: ACME Inc.
        companySize:
          type: string
          description: Size of the company requesting the trial. This is a range of number of employees.
          example: 1-10
        country:
          type: string
          description: Country of the company requesting the trial.
          example: United States
        stateOrProvince:
          type: string
          description: State or province of the company requesting the trial.
          example: California
        redirectUrlOrigin:
          type: string
          description: Origin of the redirect URL returned as result of creating the trial user.
          example: https://studio.edgeimpulse.com
        redirectUrlQueryParams:
          type: string
          description: Query parameters to be appended to the redirect URL returned as result of creating the trial user.
          example: utm_source=google&utm_medium=cpc&utm_campaign=trial
    TrialNotes:
      type: string
      description: Notes about the trial. Free form text. This field is ignored if the trial is requested by a non-admin user.
      example: This is a trial for the company's new project.
