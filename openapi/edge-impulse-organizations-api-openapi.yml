    DailyMetricsRecord:
      type: object
      required:
      - date
      - totalUsers
      - totalStaffUsers
      - totalProjects
      - totalCurrentContractCpuComputeTimeSeconds
      - totalCurrentContractGpuComputeTimeSeconds
      - totalCurrentContractComputeTimeSeconds
      - computeTimeCalculatedSince
      - totalStorageSizeBytes
      - usersAdded
      - usersDeleted
      - projectsAdded
      - projectsDeleted
      - cpuComputeTimeSeconds
      - gpuComputeTimeSeconds
      - computeTimeSeconds
      - storageBytesAdded
      - storageBytesDeleted
      properties:
        date:
          type: string
          format: date-time
          description: Date of the metrics record.
          example: '2021-01-01T00:00:00Z'
        totalUsers:
          type: integer
          description: 'Total number of users, if the metrics record applies to a non-developer profile organization.

            For developer profile organizations, we default to 0.

            '
          example: 100
        totalStaffUsers:
          type: integer
          description: 'Total number of staff users, if the metrics record applies to a non-developer profile organization.

            For developer profile organizations, we default to 0.

            '
          example: 10
        totalProjects:
          type: integer
          description: 'Total number of projects at the end of the metrics record date.

            '
          example: 50
        totalCurrentContractCpuComputeTimeSeconds:
          type: integer
          description: 'Total CPU compute time since contract start date, or organization / user creation date, at

            the end of the metrics record date.

            '
          example: 100000
        totalCurrentContractGpuComputeTimeSeconds:
          type: integer
          description: 'Total GPU compute time since contract start date, or organization / user creation date, at

            the end of the metrics record date.

            '
          example: 100000
        totalCurrentContractComputeTimeSeconds:
          type: integer
          description: 'Total compute time since contract start date, or organization / user creation date, at

            the end of the metrics record date.

            Compute time is calculated as CPU + 3*GPU compute time.

            '
          example: 100000
        computeTimeCalculatedSince:
          type: string
          format: date-time
          description: 'Date from which the total compute time is calculated. This is the contract start date for billing

            organizations, or organization / user creation date.

            '
          example: '2021-01-01T00:00:00Z'
        totalStorageSizeBytes:
          type: integer
          description: 'Total storage size in bytes at the end of the metrics record date.

            '
          example: 1000000000
        usersAdded:
          type: integer
          description: 'Number of users added during the metrics record date.

            '
          example: 10
        staffUsersAdded:
          type: integer
          description: 'Number of staff users added during the metrics record date.

            '
          example: 1
        usersDeleted:
          type: integer
          description: 'Number of users deleted during the metrics record date.

            '
          example: 5
        staffUsersDeleted:
          type: integer
          description: 'Number of staff users deleted during the metrics record date.

            '
          example: 1
        projectsAdded:
          type: integer
          description: 'Number of projects added during the metrics record date.

            '
          example: 10
        projectsDeleted:
          type: integer
          description: 'Number of projects deleted during the metrics record date.

            '
          example: 5
        cpuComputeTimeSeconds:
          type: integer
          description: 'Total CPU compute time during the metrics record date.

            '
          example: 10000
        gpuComputeTimeSeconds:
          type: integer
          description: 'Total GPU compute time during the metrics record date.

            '
          example: 10000
        computeTimeSeconds:
          type: integer
          description: 'Total compute time during the metrics record date.

            Compute time is calculated as CPU + 3*GPU compute time.

            '
          example: 10000
        storageBytesAdded:
          type: integer
          description: 'Total storage size in bytes added during the metrics record date.

            '
          example: 1000000000
        storageBytesDeleted:
          type: integer
          description: 'Total storage size in bytes deleted during the metrics record date.

            '
          example: 500000000
