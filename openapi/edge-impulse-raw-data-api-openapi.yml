components:
  parameters:
    FiltersExcludeIdsParameter:
      name: excludeIds
      in: query
      required: false
      description: Exclude samples with an ID within the given list of IDs, given as a JSON string
      schema:
        example: '[4, 5, 6]'
        type: string
    FiltersLabelsParameter:
      name: labels
      in: query
      required: false
      description: Only include samples with a label within the given list of labels, given as a JSON string
      schema:
        example: '["idle", "snake"]'
        type: string
    FiltersMaxLabelParameter:
      name: maxLabel
      in: query
      required: false
      description: Only include samples with a label < this value
      schema:
        type: number
    SearchQueryParameter:
      name: search
      in: query
      required: false
      description: Search query
      schema:
        example: <id> <name>
        type: string
    LimitResultsParameter:
      name: limit
      in: query
      required: false
      description: Maximum number of results
      schema:
        type: integer
    FiltersMaxFrequencyParameter:
      name: maxFrequency
      in: query
      required: false
      description: Only include samples with lower frequency than given frequency, in hertz
      schema:
        type: number
    AfterInputBlockParameter:
      name: afterInputBlock
      in: query
      required: false
      description: Whether to process the image through the input block first
      schema:
        type: boolean
    RawDataCategoryQueryParameter:
      name: category
      in: query
      required: true
      description: Which of the three acquisition categories to retrieve data from
      schema:
        type: string
        enum:
        - training
        - testing
        - anomaly
    ProposedActionsJobIdParameter:
      name: proposedActionsJobId
      in: query
      required: false
      description: Pass this parameter when querying samples from inside an AI Action job. If you pass this parameter in a multi-stage AI Action, previous proposed changes (from an earlier step) will be applied to the returned dataset.
      schema:
        type: integer
    ProjectIdParameter:
      name: projectId
      in: path
      required: true
      description: Project ID
      schema:
        type: integer
    ZoomEnd:
      name: zoomEnd
      in: query
      required: false
      description: Zoom into the sample, with the focus ending at this index
      schema:
        type: integer
    JobIdParameter:
      name: jobId
      in: path
      required: true
      description: Job ID
      schema:
        type: integer
    OptionalImpulseIdParameter:
      name: impulseId
      in: query
      required: false
      description: Impulse ID. If this is unset then the default impulse is used.
      schema:
        type: integer
    ZoomStart:
      name: zoomStart
      in: query
      required: false
      description: Zoom into the sample, with the focus starting at this index
      schema:
        type: integer
    AxisIndexParameter:
      name: axisIx
      in: query
      required: true
      description: Axis index
      schema:
        type: integer
    RawDataCategoryParameter:
      name: category
      in: path
      required: true
      description: Which of the three acquisition categories to download data from
      schema:
        type: string
        enum:
        - training
        - testing
        - anomaly
    OffsetResultsParameter:
      name: offset
      in: query
      required: false
      description: Offset in results, can be used in conjunction with LimitResultsParameter to implement paging.
      schema:
        type: integer
    SliceStartParameter:
      name: sliceStart
      in: query
      required: true
      description: Begin index of the slice
      schema:
        type: integer
    OptionalSliceEndParameter:
      name: sliceEnd
      in: query
      required: false
      description: End index of the slice. If not given, the whole sample is used.
      schema:
        type: integer
    FiltersFilenameParameter:
      name: filename
      in: query
      required: false
      description: Only include samples whose filename includes the given filename
      schema:
        type: string
    FiltersMinFrequencyParameter:
      name: minFrequency
      in: query
      required: false
      description: Only include samples with higher frequency than given frequency, in hertz
      schema:
        type: number
    SampleIdParameter:
      name: sampleId
      in: path
      required: true
      description: Sample ID
      schema:
        type: integer
    OptionalSliceEndDefaultToWindowLengthParameter:
      name: sliceEnd
      in: query
      required: false
      description: End index of the slice. If not given, the sample will be sliced to the same length as the impulse input block window length.
      schema:
        type: integer
    FiltersMaxLengthParameter:
      name: maxLength
      in: query
      required: false
      description: Only include samples shorter than the given length, in milliseconds
      schema:
        type: integer
    FiltersMinLengthParameter:
      name: minLength
      in: query
      required: false
      description: Only include samples longer than the given length, in milliseconds
      schema:
        type: integer
    CacheKeyParameter:
      name: cacheKey
      in: query
      required: false
      description: If set, then a long cache header is sent. If this is omitted then a no-cache header is sent. You can use this if you f.e. know the last modified date of a sample. Stick the last modified date in the cache key, so the sample can be stored in browser cache (and will automatically be invalidated if the modified date changes).
      schema:
        type: string
    FiltersDisabledParameter:
      name: includeDisabled
      in: query
      required: false
      description: Include only enabled or disabled samples (or both)
      schema:
        type: string
        enum:
        - both
        - enabled
        - disabled
    OptionalSliceStartParameter:
      name: sliceStart
      in: query
      required: false
      description: Begin index of the slice. If not given, the whole sample is used.
      schema:
        type: integer
    ExcludeSensorsParameter:
      name: excludeSensors
      in: query
      required: false
      description: Whether to exclude sensors in the response (as these can slow down requests when you have large pages).
      schema:
        type: boolean
    LimitPayloadValues:
      name: limitPayloadValues
      in: query
      required: false
      description: Limit the number of payload values in the response
      schema:
        type: integer
    FiltersMinLabelParameter:
      name: minLabel
      in: query
      required: false
      description: Only include samples with a label >= this value
      schema:
        type: number
    FiltersSignatureParameter:
      name: signatureValidity
      in: query
      required: false
      description: Include samples with either valid or invalid signatures
      schema:
        type: string
        enum:
        - both
        - valid
        - invalid
    FiltersIdsParameter:
      name: ids
      in: query
      required: false
      description: Only include samples with an ID within the given list of IDs, given as a JSON string
      schema:
        example: '[1, 2, 3]'
        type: string
  schemas:
    CropSampleRequest:
      type: object
      required:
      - cropStart
      - cropEnd
      properties:
        cropStart:
          type: integer
          description: New start index of the sample
          example: 0
        cropEnd:
          type: integer
          description: New end index of the sample
          example: 128
    SegmentSampleRequest:
      type: object
      required:
      - segments
      properties:
        segments:
          type: array
          items:
            type: object
            required:
            - startMs
            - endMs
            properties:
              startMs:
                type: integer
              endMs:
                type: integer
    TrackObjectsRequest:
      type: object
      required:
      - sourceSampleId
      - nextSampleId
      properties:
        sourceSampleId:
          type: integer
        nextSampleId:
          type: integer
    SetSampleProposedChangesRequest:
      type: object
      required:
      - jobId
      - proposedChanges
      properties:
        jobId:
          type: integer
          description: Job ID of an AI Actions job. This is passed into your job via the --propose-actions argument.
        proposedChanges:
          $ref: '#/components/schemas/SampleProposedChanges'
    DataExplorerPredictionsResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - predictions
        - labels
        - classificationType
        properties:
          predictions:
            type: array
            items:
              $ref: '#/components/schemas/ModelPrediction'
          labels:
            type: array
            items:
              type: string
          classificationType:
            type: string
            enum:
            - classification
            - regression
    Sensor:
      type: object
      required:
      - name
      - units
      properties:
        name:
          type: string
          description: Name of the axis
          example: accX
        units:
          type: string
          description: Type of data on this axis. Needs to comply to SenML units (see https://www.iana.org/assignments/senml/senml.xhtml).
    ProjectSampleMetadata:
      type: object
      description: Project sample metadata
      required:
      - metadata
      properties:
        metadata:
          type: array
          description: Array with all available sample metadata.
          items:
            $ref: '#/components/schemas/SampleMetadata'
    CountSamplesResponse:
      allOf:
