    SampleProposedChanges:
      type: object
      properties:
        label:
          type: string
          description: New label (single-label)
        isDisabled:
          type: boolean
          description: True if the current sample should be disabled; or false if it should not be disabled.
        boundingBoxes:
          type: array
          description: List of bounding boxes. The existing bounding boxes on the sample will be replaced (so if you want to add new bounding boxes, use the existing list as a basis).
          items:
            $ref: '#/components/schemas/BoundingBox'
        metadata:
          type: object
          description: Free form associated metadata. The existing metadata on the sample will be replaced (so if you want to add new metadata, use the existing list as a basis).
          additionalProperties:
            type: string
        structuredLabels:
          type: array
          description: New label (multi-label)
          items:
            $ref: '#/components/schemas/StructuredLabel'
    GetDiversityDataResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        properties:
          data:
            type: array
            items:
              type: object
              required:
              - clusterInfos
              - maxDistance
              properties:
                labelId:
                  type: number
                maxDistance:
                  type: number
                clusterInfos:
                  type: array
                  items:
                    type: object
                    description: Information about a cluster of samples
                    required:
                    - idx
                    - indexes
                    - windows
                    - vendiScore
                    - vendiRatio
                    - count
                    - distance
                    - leftIdx
                    - rightIdx
                    properties:
                      idx:
                        type: integer
                        description: Unique index of the cluster
                      indexes:
                        type: array
                        items:
                          type: integer
                        description: Indexes of all windows contained in the cluster (for debugging)
                      windows:
                        type: array
                        items:
                          type: array
                          items:
                            type: integer
                        description: The sample ID and window start and end of every window in the cluster
                      samples:
                        type: array
                        items:
                          $ref: '#/components/schemas/Sample'
                        description: Details of every sample in the cluster
                      vendiScore:
                        type: number
                        description: Raw vendi score
                      vendiRatio:
                        type: number
                        description: Vendi score expressed as ratio from 0 to 1
                      count:
                        type: integer
                        description: The number if windows in the cluster
                      distance:
                        type: number
                        description: The distance of the cluster from the origin
                      leftIdx:
                        type: integer
                        nullable: true
                        description: The cluster id on the left branch of the dendrogram
                      rightIdx:
                        type: integer
                        nullable: true
                        description: The cluster id on the right branch of the dendrogram
    NeighborsData:
      type: object
      description: Describes the results of running the nearest neighbors label noise detection method.
      required:
