          - current-impulse-embeddings
        dimensionalityReductionTechnique:
          type: string
          enum:
          - tsne
          - pca
        impulseId:
          type: integer
          description: Which impulse to use (if preset is either 'current-impulse' or 'current-impulse-embeddings'). If this is undefined then 'defaultImpulseId' is used.
    BatchClearMetadataByKeyRequest:
