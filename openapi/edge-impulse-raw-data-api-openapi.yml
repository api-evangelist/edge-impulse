    CosineSimilarityIssue:
      type: object
      description: Describes a sample that has potential issues as identified by the cosine similarity label noise detection method.
      required:
      - id
      - label
      - issues
      properties:
        id:
          type: integer
          description: The ID of this sample
        sample:
          $ref: '#/components/schemas/Sample'
          description: Detailed information about the sample
        label:
          type: integer
          description: The label of this sample, in index form
        issues:
          type: array
          description: A list of samples that have windows that are symptomatic of this issue.
          items:
            type: object
            required:
            - id
            - label
            - windows
            properties:
              id:
                type: integer
                description: The ID of this sample
              sample:
                $ref: '#/components/schemas/Sample'
                description: Detailed information about the sample
              label:
                type: integer
                description: The label of this sample, in index form
              windows:
                type: array
                description: The windows in this sample that are symptomatic of this issue.
                items:
                  type: object
                  required:
                  - windowStart
                  - windowEnd
                  - score
                  properties:
                    windowStart:
                      type: integer
                      description: The start time of this window in milliseconds
                    windowEnd:
                      type: integer
                      description: The end time of this window in milliseconds
                    score:
                      type: number
                      description: The cosine similarity score between this window and a window from the sample in the parent object.
    UploadImageRequest:
