      - name
      - bucketId
      - bucketName
      - bucketPath
      - dataset
      - totalFileCount
      - totalFileSize
      - created
      - metadata
      - files
      properties:
        id:
          type: integer
        name:
          type: string
        bucketId:
          type: integer
        bucketName:
          type: string
        bucketPath:
          type: string
        dataset:
          type: string
        totalFileCount:
          type: integer
        totalFileSize:
          type: integer
        created:
          type: string
          format: date-time
        metadata:
          type: object
