        properties:
          transformationJobs:
            type: array
            items:
              type: object
              required:
              - id
              - transformationJobId
              - createProjectId
              - created
              - jobId
              - transformationBlockName
              properties:
                id:
                  type: integer
                transformationJobId:
                  type: integer
                createProjectId:
                  type: integer
                created:
                  type: string
                  format: date-time
                jobId:
                  type: integer
                jobStarted:
                  type: string
                  format: date-time
                jobFinished:
                  type: string
                  format: date-time
                jobFinishedSuccessful:
                  type: boolean
                transformationBlockName:
                  type: string
                pipelineName:
                  type: string
          totalTransformationJobCount:
            type: integer
    VerifyOrganizationExistingBucketRequest:
      type: object
      required:
      - prefix
      properties:
        prefix:
          type: string
    ListOrganizationFilesResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - totalFileSize
        - totalFileCount
        - totalDataItemCount
        - data
        properties:
          filterParseError:
            type: string
          totalFileSize:
            type: integer
          totalFileCount:
            type: integer
          totalDataItemCount:
            type: integer
          data:
            type: array
            items:
              $ref: '#/components/schemas/OrganizationDataItem'
    OrganizationDataItem:
