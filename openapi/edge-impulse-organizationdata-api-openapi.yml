      - clinical
      - files
    OrganizationDatasetBucket:
      type: object
      required:
      - id
      - bucket
      - path
      - fullBucketPathDescription
      - dataItemNamingLevelsDeep
      properties:
        id:
          description: Bucket ID
          type: integer
        bucket:
          type: string
        path:
          description: Path in the bucket
          type: string
        fullBucketPathDescription:
          description: Full bucket path, incl. protocol (e.g. s3://bucket/path) - to be used in the UI
          type: string
        dataItemNamingLevelsDeep:
          description: Number of levels deep for data items, e.g. if you have folder "test/abc", with value 1 "test" will be a data item, with value 2 "test/abc" will be a data item. Only used for "clinical" type.
          type: integer
    GetOrganizationBucketResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - bucket
        properties:
          bucket:
