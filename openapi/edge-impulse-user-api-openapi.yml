            type: boolean
            description: Whether this is an ephemeral evaluation account.
          ambassador:
            type: boolean
            description: Whether this user is an ambassador.
          whitelabels:
            description: List of white labels the user is a member of
            type: array
            items:
              type: object
              required:
              - id
