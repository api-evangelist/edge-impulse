                domain:
                  type: string
                name:
                  type: string
                ownerOrganizationId:
                  type: number
                isAdmin:
                  type: boolean
                  description: Whether the user is an admin of the white label.
          suspended:
            type: boolean
            description: Whether the user is suspended.
          notifications:
            type: array
            description: List of notifications to show to the user.
            items:
              type: string
