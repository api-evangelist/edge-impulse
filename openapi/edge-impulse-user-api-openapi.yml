            example: utm_source=google&utm_medium=cpc&utm_campaign=trial
          utmParams:
            type: array
            description: List of UTM parameters.
            items:
              $ref: '#/components/schemas/UtmParameter'
    UserSetTotpMfaKeyRequest:
      type: object
      required:
      - key
      - totpToken
      properties:
        key:
          type: string
          description: Secret key obtained through `userGenerateNewMfaKey`.
        totpToken:
          type: string
          description: TOTP token that is valid for the key (to ensure the device is configured correctly)
    GetJWTResponse:
      example: '`{ "success": true, "token": "A372jdhe.ad3r4gfrg" }`'
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        properties:
          token:
            type: string
            description: JWT token, to be used to log in in the future through JWTAuthentication
          redirectUrl:
            type: string
            description: Redirect URL to follow to complete login
    SetUserPasswordRequest:
      type: object
      required:
      - accessToken
      - identityProvider
      - password
      properties:
        accessToken:
          type: string
        identityProvider:
          type: string
        password:
          type: string
    VerifyResetPasswordRequest:
      type: object
      required:
      - email
      - code
      properties:
        email:
          type: string
        code:
          type: string
    ListEmailResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - emails
        properties:
          emails:
            type: array
            description: List of emails
            items:
              type: object
              required:
              - from
              - to
              - created
              - subject
              - bodyText
              - bodyHTML
              - sent
              - providerResponse
              properties:
                userId:
                  type: integer
                projectId:
                  type: integer
                from:
                  type: string
                to:
                  type: string
                created:
                  type: string
                  format: date-time
                subject:
                  type: string
                bodyText:
                  type: string
                bodyHTML:
                  type: string
                sent:
                  type: boolean
                providerResponse:
                  type: string
    CreateProTierUserRequest:
      allOf:
      - $ref: '#/components/schemas/CreateUserRequest'
      - type: object
        properties:
          redirectUrlOrigin:
            type: string
            description: Origin of the redirect URL returned as result of creating the professional user.
            example: https://studio.edgeimpulse.com
          redirectUrlQueryParams:
            type: string
            description: Query parameters to be appended to the redirect URL returned as result of creating the professional user.
            example: utm_source=google&utm_medium=cpc&utm_campaign=trial
    ListEnterpriseTrialsResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - trials
        properties:
          trials:
            type: array
            description: Current or past enterprise trials.
            items:
              $ref: '#/components/schemas/EnterpriseTrial'
    UpgradeSubscriptionRequest:
      type: object
      required:
      - billingCycle
      - successUrl
      - cancelUrl
      properties:
        billingCycle:
          $ref: '#/components/schemas/BillingCycle'
          description: 'Selects the billing frequency for the subscription.

            Either ''monthly'' for regular monthly charges or ''yearly''

            for annual billing with a potential discount.

            '
        successUrl:
          type: string
          description: URL to redirect the user to after a successful checkout process.
        cancelUrl:
          type: string
          description: URL to redirect the user to after the checkout process is canceled.
    EntityCreatedResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - id
        properties:
          id:
            type: integer
            description: Unique identifier of the created entity.
    UpdateUserRequest:
      type: object
      description: Only fields set in this object will be updated.
      properties:
        name:
          type: string
          description: New full name
          example: Jan Jongboom
        jobTitle:
          type: string
          description: New job title
          example: Embedded Software Engineer
        companyName:
          type: string
          description: New company name
          example: Edge Impulse Inc.
        experiments:
          type: array
          items:
            type: string
          description: List of user experiments
        projectsSortOrder:
          description: Default sort order on the projects list
          $ref: '#/components/schemas/UserProjectsSortOrder'
        timezone:
          description: User timezone.
          type: string
    ListOrganizationsResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - organizations
        properties:
          organizations:
            type: array
            description: Array with organizations
            items:
              $ref: '#/components/schemas/Organization'
    UserByThirdPartyActivationRequest:
      type: object
      required:
      - activationCode
      properties:
        activationCode:
          type: string
    GetUserProjectsResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        required:
        - projects
        properties:
          projects:
            type: array
            items:
              $ref: '#/components/schemas/Project'
    Organization:
      type: object
      required:
      - id
      - name
      - users
      - isDeveloperProfile
      - whitelabelId
      - trialId
      - trialExpiredDate
      - trialUpgradedDate
      - created
      - showHeaderImgMask
      properties:
        id:
          type: integer
        name:
          type: string
          description: EdgeImpulse Inc.
        logo:
          type: string
          example: https://usercdn.edgeimpulse.com/logos/1.jpg
        headerImg:
          type: string
          example: https://usercdn.edgeimpulse.com/leaders/1.jpg
        showHeaderImgMask:
          type: boolean
        users:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationUser'
        isDeveloperProfile:
          type: boolean
        whitelabelId:
          type: integer
          nullable: true
          description: Unique identifier of the white label this organization belongs to, if any.
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        trialId:
          type: integer
          nullable: true
          description: Unique identifier of the trial this organization belongs to, if any.
        trialExpiredDate:
          type: string
          format: date-time
          nullable: true
          description: Date when the trial expired, if any. A expired trial has a grace period of 30 days before it's associated organization is deleted.
        trialUpgradedDate:
          type: string
          format: date-time
          nullable: true
          description: Date when the trial was upgraded to a full enterprise account, if any.
        created:
          type: string
          format: date-time
          description: Date when the organization was created.
        contractStartDate:
          type: string
          format: date-time
          nullable: true
          description: Date when the current contract started, if any.
        deletedDate:
          type: string
          format: date-time
          description: The date in which the organization was deleted. If the organization is not deleted, this field is not set.
    DowngradeSubscriptionRequest:
      type: object
      properties:
        downgradeReason:
          type: string
          description: Reason for downgrading the subscription.
    TrialExpirationDate:
      type: string
      format: date-time
      description: Expiration date of the trial. The trial will be set as expired after this date. There will be a grace period of 30 days after a trial expires before fully deleting the trial organization. This field is ignored if the trial is requested by a non-admin user, defaulting to 14 days trial.
      example: '2020-01-01T00:00:00Z'
    RequestResetPasswordRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
    CreateUserRequest:
      type: object
      required:
      - name
      - username
      - email
      - privacyPolicy
      properties:
        name:
          type: string
          description: Your name
          example: Jan Jongboom
        username:
          type: string
          description: Username, minimum 4 and maximum 30 characters. May contain alphanumeric characters, hyphens, underscores and dots. Validated according to `^(?=.{4,30}$)(?![_.])(?!.*[_.]{2})[a-zA-Z0-9._-]+(?<![_.])$`.
          example: janjongboom
        email:
          type: string
          description: E-mail address. Will need to be validated before the account will become active.
          example: jan@edgeimpulse.com
        password:
          type: string
          description: Password, minimum length 8 characters.
        projectName:
          type: string
          description: A project will automatically be created. Sets the name of the first project. If not set, this will be derived from the username.
        privacyPolicy:
          type: boolean
          description: Whether the user accepted the privacy policy
        activationToken:
          type: string
          description: Activation token for users created via SSO
        identityProvider:
          type: string
          description: Unique identifier of the identity provider asserting the identity of this user
        jobTitle:
          type: string
          description: Job title of the user. Optional field
        sessionId:
          type: string
          description: Session ID. Optional field
        companyName:
          type: string
          description: ACME Inc.
        utmParams:
          type: array
          description: List of UTM parameters.
          items:
            $ref: '#/components/schemas/UtmParameter'
        ignoreEmailValidation:
          type: boolean
          description: If true, allows signup to proceed despite a potentially invalid email. Note that this will enforce email verification post-signup
    CreateUserResponse:
      allOf:
      - $ref: '#/components/schemas/GenericApiResponse'
      - type: object
        properties:
          redirectUrl:
            type: string
            description: URL to redirect user to.
          id:
            type: integer
            description: User unique identifier
    UploadUserPhotoRequest:
      type: object
      required:
      - photo
      properties:
        photo:
          type: string
          format: binary
    GenericApiResponse:
      type: object
      required:
      - success
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        error:
          type: string
          description: Optional error description (set if 'success' was false)
    UserExperiment:
      type: object
      required:
      - type
      - title
      - enabled
      - showToUser
      properties:
        type:
          type: string
        title:
          type: string
        help:
          type: string
        enabled:
          type: boolean
        showToUser:
          type: boolean
    ResetPasswordRequest:
      type: object
      required:
      - email
      - code
      - newPassword
      properties:
        email:
          type: string
        code:
          type: string
        newPassword:
          type: string
  parameters:
    UsernameOrEmailParameter:
      name: usernameOrEmail
      in: path
      required: true
      description: Username or email
      schema:
        type: string
    UserExcludeProjectsParameter:
      name: excludeProjects
      in: query
      required: false
      description: If set to "true", the "projects" field is left empty (will be faster if you call this function a lot). Use `getCurrentUserProjects` to get the project list in a separate call.
      schema:
        type: boolean
    UserIdParameter:
      name: userId
      in: path
      required: true
      description: User ID
      schema:
        type: integer
  securitySchemes:
    ApiKeyAuthentication:
      type: apiKey
      in: header
      name: x-api-key
    JWTAuthentication:
      type: apiKey
      in: cookie
      name: jwt
    JWTHttpHeaderAuthentication:
      type: apiKey
      in: header
      name: x-jwt-token
