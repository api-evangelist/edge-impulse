            type: string
            format: date-time
            description: The date at which the user's subscription will be downgraded due to cancellation.
          subscriptionTerminationDate:
            type: string
            format: date-time
            description: The date at which the user's subscription will be automatically terminated due to failed payments.
          passwordConfigured:
            type: boolean
