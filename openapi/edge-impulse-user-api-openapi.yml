            description: The ongoing free Enterprise trials that the user has created, if any.
            $ref: '#/components/schemas/EnterpriseTrial'
          hasEnterpriseFeaturesAccess:
            type: boolean
            description: Whether the current user has access to enterprise features. This is true if the user is an enterprise user, or has an active enterprise trial.
